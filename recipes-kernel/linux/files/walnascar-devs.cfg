# meta-sieltre-kernel/recipes-kernel/linux/linux-toradex/imx95-builtin-fix.cfg
#
# Fix consolidato per iMX95 / Torizon Walnascar:
# driver critici che devono essere built-in (=y) per evitare
# deferred probe / mancata inizializzazione al boot.
#
# Il problema comune: con =m questi driver vengono caricati da udev
# DOPO che i consumer (PCIe NIC, DRM) hanno già tentato il probe.
# Su OSTree/Torizon il retry non si risolve → device non disponibile.
#
# ─────────────────────────────────────────────────────────────────────
# 1. NVMEM / eFuse — MAC address per le NIC PCIe
# ─────────────────────────────────────────────────────────────────────
# fsl,imx95-ocotp è gestito da NVMEM_IMX_OCOTP_ELE (non dal vecchio
# NVMEM_IMX_OCOTP che è per iMX6/7/8). Con =m le tre NIC PCIe
# (0002:00:00.0, :00:08.0, :00:10.0) restano in deferred probe
# aspettando il nvmem provider mac-address@{0,1,2} che non arriva.
CONFIG_NVMEM_IMX_OCOTP_ELE=y

# ─────────────────────────────────────────────────────────────────────
# 2. DRM / Display — DPU95 display controller
# ─────────────────────────────────────────────────────────────────────
# Il display controller di iMX95 è il DPU95. Con =m il modulo
# viene caricato tardi e /dev/fb* / /dev/dri/card* non appaiono.
CONFIG_DRM_IMX95_DPU=y

# Dipendenze del DPU95 che devono essere built-in di conseguenza
CONFIG_DRM_IMX95_PIXEL_LINK=y
CONFIG_DRM_IMX95_PIXEL_INTERLEAVER=y
CONFIG_DRM_IMX95_LDB=y
CONFIG_DRM_IMX95_MIPI_DSI=y
